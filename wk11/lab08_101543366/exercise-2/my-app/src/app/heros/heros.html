<p>heros works!</p>
<h2>My Heroes</h2>

<ul>
  <li *ngFor="let hero of heros" (click)="onSelect(hero)">
  <span>{{ hero.id }}</span> - {{ hero.name | removeSpaces }}
</li>
</ul>

<div *ngIf="selectedHero">
  <h2>{{ selectedHero.name }} Details</h2>
  <p>Id: {{ selectedHero.id }}</p>

  <label for="name">Hero name: </label>
  <input id="name" [(ngModel)]="selectedHero.name" placeholder="name">
</div>

<h3>Custom Directive Example</h3>
<input type="text" appInputFormat placeholder="Type something here">
